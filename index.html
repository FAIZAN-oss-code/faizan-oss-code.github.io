<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 17</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle at center,#2b1055,#000000);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow:hidden;
}

.aura{
  position:absolute;
  width:350px;
  height:350px;
  background: radial-gradient(circle,
    rgba(255,215,0,0.8) 0%,
    rgba(255,0,255,0.4) 40%,
    transparent 70%);
  border-radius:50%;
  filter:blur(50px);
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

.cake{
  font-size:90px;
  z-index:2;
  cursor:pointer;
  transition:0.3s;
}

.cake:hover{
  transform:scale(1.1);
}

h1{
  margin-top:20px;
  font-size:30px;
  text-shadow:0 0 20px gold;
}

#countdown{
  margin-top:15px;
  font-size:18px;
  color:gold;
}

</style>
</head>

<body>

<div class="aura"></div>

<div class="cake" onclick="unlock()">🎂</div>

<h1 id="title">Happy 17th Birthday Fahad 👑</h1>

<div id="countdown"></div>

<script>
const birthday = new Date("March 6, 2026 00:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const distance = birthday - now;

  const days = Math.floor(distance/(1000*60*60*24));

  document.getElementById("countdown").innerHTML =
  days + " Days to Level 17 🔓";
},1000);

function unlock(){
  document.getElementById("title").innerHTML =
  "LEVEL 17 UNLOCKED 🔥";
}
</script>

</body>
</html>
